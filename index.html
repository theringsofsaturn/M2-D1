        function MinMax() {
            // create the array with the numbers in it

            let min = array[0]
            let max = array[0]
            // create a min and a max variable where I can store the values
            for (let i = 1; i < array.length; i++) {

                let currentElement = array[i]
                // if the element is greater than any other elements, so far, we have a new MAX

                }
                // if the element is lower than any other elements, so far, we have a new MIN

            // create a container for the result
            let result = []
            while (arr1.length > 0) {

            const middlePoint = array.length / 2

        function sumTDS() {
            const tds = document.querySelectorAll("td")
            let sum = 0
            for (let i = 0; i < tds.length; i++) {
                const content = tds[i].innerText // extracting the content from the cell
                const numericContent = parseFloat(content) // parsing the content as a number

                }
            }

        }
